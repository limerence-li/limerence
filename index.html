/* ============================================================
   STATE & RENDER
   ============================================================ */

let activeCat = '全部';
const today = '2026-06-15';
const NEW_DAYS = 7;

function daysSince(iso) {
  if (!iso) return Infinity;
  const d = new Date(iso), t = new Date(today);
  return Math.round((t - d) / 86400000);
}

// 按 updatedAt 倒序排（新的在前）
weapons.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));

document.getElementById('totalCount').textContent = weapons.length;
document.getElementById('newCount').textContent = weapons.filter(w => daysSince(w.updatedAt) <= NEW_DAYS).length;

// ---- Random weapon
function setupRandom() {
  const pool = weapons.map(w => ({ title: w.name, cat: w.cat }));
  const slot = document.getElementById('slot');
  const btn = document.getElementById('rngBtn');

  btn.addEventListener('click', () => {
    if (!pool.length) return;
    btn.disabled = true;
    slot.classList.remove('final');
    const start = Date.now();
    const spinMs = 2000;
    slot.textContent = `${pick(pool).title} (${pick(pool).cat})`;
    const timer = setInterval(() => {
      const x = pick(pool);
      slot.textContent = `${x.title} (${x.cat})`;
      if (Date.now() - start >= spinMs) {
        clearInterval(timer);
        const final = pick(pool);
        slot.textContent = `${final.title} (${final.cat})`;
        slot.classList.add('final');
        btn.disabled = false;
      }
    }, 90);
  });
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
}

// ---- Sidebar navigation
function renderNav() {
  const nav = document.getElementById('navMenu');
  nav.innerHTML = navTabs.map(t => {
    if (t.active) {
      return `<button class="nav-item nav-active" data-tab="${t.id}">
        <i class="${t.icon}"></i><span>${escapeHtml(t.label)}</span>
      </button>`;
    }
    return `<div class="nav-item nav-disabled" title="敬请期待">
      <i class="${t.icon}"></i><span>${escapeHtml(t.label)}</span>
      <span class="nav-soon">敬请期待</span>
    </div>`;
  }).join('');
}

// ---- Sidebar open/close (mobile)
function setupSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const open = () => { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); };
  const close = () => { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); };
  document.getElementById('sidebarOpen').addEventListener('click', open);
  document.getElementById('sidebarClose').addEventListener('click', close);
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
}

// ---- Category filter
function renderFilters() {
  document.getElementById('filters').innerHTML = categories.map(c =>
    `<button class="pill ${c === activeCat ? 'pill-on' : 'pill-off'}" data-cat="${escapeAttr(c)}">${escapeHtml(c)}</button>`
  ).join('');
  document.querySelectorAll('#filters .pill').forEach(b => {
    b.addEventListener('click', () => {
      activeCat = b.dataset.cat;
      renderFilters();
      renderGrid();
    });
  });
}

// ---- Weapon grid
function renderGrid() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const list = weapons
    .map((w, idx) => ({ w, idx }))
    .filter(({ w }) => activeCat === '全部' || w.cat === activeCat)
    .filter(({ w }) => {
      if (!q) return true;
      const haystack = [
        w.name, w.cat, w.desc || '',
        ...(w.codes || []).flatMap(c => [c.code, c.desc || '', c.tag || ''])
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    });

  document.getElementById('weaponGrid').innerHTML = list.map(({ w, idx }) => {
    const isNew = daysSince(w.updatedAt) <= NEW_DAYS;
    return `
    <div class="weapon-card bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden relative" data-idx="${idx}">
      <div class="relative h-32 bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-700 dark:to-gray-800 flex items-center justify-center text-6xl p-3">
        ${iconMarkup(w, 'max-h-24 max-w-[85%] object-contain drop-shadow-md')}
        ${isNew ? `<span class="badge-new absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded shadow">NEW</span>` : ''}
        <span class="absolute top-2 right-2 bg-indigo-600 text-white text-xs px-2 py-1 rounded font-semibold">
          ${w.codes.length} 套
        </span>
      </div>
      <div class="p-4 flex items-center justify-between gap-2">
        <div class="min-w-0">
          <div class="text-base font-bold text-gray-800 dark:text-gray-100 truncate">${escapeHtml(w.name)}</div>
          <span class="inline-block mt-1 text-xs px-2 py-0.5 rounded bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 font-medium">${escapeHtml(w.cat)}</span>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-400 text-sm shrink-0"></i>
      </div>
    </div>`;
  }).join('') || `<div class="col-span-full text-center py-12 text-gray-400">没有匹配的武器</div>`;
}

// ---- Weapon detail modal
function openDetail(idx) {
  const w = weapons[idx];
  if (!w) return;
  document.getElementById('detailEmoji').innerHTML = iconMarkup(w, 'h-24 mx-auto object-contain drop-shadow-lg');
  document.getElementById('detailCat').textContent = w.cat;
  document.getElementById('detailName').textContent = w.name;
  document.getElementById('detailDesc').textContent = w.desc || '';
  document.getElementById('detailCount').textContent = w.codes.length;
  document.getElementById('detailUpdated').textContent = w.updatedAt || '—';

  // Keep code order as defined
  const codes = w.codes;

  document.getElementById('detailTbody').innerHTML = codes.map((c, i) => `
    <tr class="hover:bg-indigo-50/70 dark:hover:bg-gray-800 transition">
      <td class="border border-gray-200 dark:border-gray-700 px-4 py-2">
        <div class="flex items-center gap-2">
          <code class="code-mono text-indigo-600 dark:text-green-400 break-all">${escapeHtml(c.code)}</code>
          <button class="copy-btn shrink-0 inline-flex items-center justify-center w-7 h-7 rounded border border-indigo-200 dark:border-indigo-700 hover:bg-indigo-600 hover:text-white text-indigo-700 dark:text-indigo-300 transition" data-copy="${escapeAttr(c.code)}" title="复制">
            <i class="fa-regular fa-copy text-xs"></i>
          </button>
        </div>
      </td>
      <td class="border border-gray-200 dark:border-gray-700 px-4 py-2 text-center text-gray-700 dark:text-gray-300">
        ${c.tag ? `<span class="text-xs px-2 py-0.5 rounded bg-indigo-100 dark:bg-indigo-800 text-indigo-700 dark:text-indigo-200 font-semibold mr-1">${escapeHtml(c.tag)}</span>` : ''}
        <span class="text-sm">${escapeHtml(c.desc || '')}</span>
      </td>
      <td class="border border-gray-200 dark:border-gray-700 px-4 py-2 text-center text-gray-700 dark:text-gray-300 whitespace-nowrap">${escapeHtml(c.value || '—')}</td>
      <td class="border border-gray-200 dark:border-gray-700 px-4 py-2 text-center whitespace-nowrap">
        <button class="copy-btn inline-flex items-center gap-1 text-xs px-2 py-1 rounded border border-indigo-200 dark:border-indigo-700 hover:bg-indigo-600 hover:text-white text-indigo-700 dark:text-indigo-300 transition" data-copy="${escapeAttr(c.code)}">
          <i class="fa-regular fa-copy"></i> 复制
        </button>
      </td>
    </tr>
  `).join('');

  // Related weapons (same category, exclude self)
  const related = weapons.filter(x => x.cat === w.cat && x.name !== w.name).slice(0, 8);
  document.getElementById('relatedWeapons').innerHTML = related.map(r => `
    <button class="related-pill text-xs px-3 py-1.5 rounded-full bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-300 transition" data-idx="${weapons.indexOf(r)}">
      ${escapeHtml(r.name)}
    </button>
  `).join('');

  document.getElementById('detailModal').classList.add('on');
}
function closeDetail() {
  document.getElementById('detailModal').classList.remove('on');
}
document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target.id === 'detailModal') closeDetail();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ---- Search
function setupSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  if (!input) return;
  const toggleClear = () => clear.classList.toggle('hidden', !input.value);
  input.addEventListener('input', () => { toggleClear(); renderGrid(); });
  clear.addEventListener('click', () => { input.value = ''; toggleClear(); renderGrid(); input.focus(); });
}

/* ============================================================
   COPY + TOAST + CARD CLICK
   ============================================================ */
function bindCopy() {
  document.body.addEventListener('click', async e => {
    const btn = e.target.closest('[data-copy]');
    if (!btn) return;
    const text = btn.dataset.copy;
    try {
      await navigator.clipboard.writeText(text);
      if (btn.classList.contains('copy-btn')) {
        const orig = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = '<i class="fa-solid fa-check"></i>';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
      } else {
        toast('改枪码已复制');
      }
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      toast('改枪码已复制');
    }
  });

  // Card click → open detail (unless clicking copy button or related pill)
  document.getElementById('weaponGrid').addEventListener('click', e => {
    if (e.target.closest('[data-copy]')) return;
    const card = e.target.closest('.weapon-card');
    if (!card) return;
    openDetail(parseInt(card.dataset.idx, 10));
  });

  // Related weapon pill → open that weapon
  document.getElementById('relatedWeapons').addEventListener('click', e => {
    const pill = e.target.closest('.related-pill');
    if (!pill) return;
    openDetail(parseInt(pill.dataset.idx, 10));
  });
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================
   DARK MODE
   ============================================================ */
function setupDark() {
  const html = document.documentElement;
  const icon = document.getElementById('themeIcon');
  function refresh() { icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙'; }
  refresh();
  document.getElementById('toggleDark').addEventListener('click', () => {
    html.classList.toggle('dark');
    localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
    refresh();
  });
}

/* ============================================================
   HELPERS
   ============================================================ */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/\n/g, ' '); }

/* ============================================================
   BOOT
   ============================================================ */
renderNav();
setupSidebar();
setupRandom();
renderFilters();
renderGrid();
setupSearch();
bindCopy();
setupDark();
</script>
</body>
</html>
